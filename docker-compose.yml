services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: trip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tripuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trippass}
      POSTGRES_DB: ${POSTGRES_DB:-tripdb}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tripuser} -d ${POSTGRES_DB:-tripdb}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Next.js App ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trip-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tripuser}:${POSTGRES_PASSWORD:-trippass}@postgres:5432/${POSTGRES_DB:-tripdb}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  pgdata:
    driver: local
