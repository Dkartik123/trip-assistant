name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # ─── Lint & Type Check ─────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run format:check

  # ─── Unit Tests ─────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci
      - run: npm run test

  # ─── Build ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci
      - run: npm run build
        env:
          # Dummy values for build (no runtime needed)
          DATABASE_URL: postgresql://x:x@localhost:5432/x
          NEXTAUTH_SECRET: build-secret-placeholder
          TELEGRAM_BOT_TOKEN: fake-token
          ANTHROPIC_API_KEY: sk-ant-fake
          OPENAI_API_KEY: sk-fake

  # ─── Deploy (only on push to main) ─────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /opt/trip-assistant
            echo "📥 Pulling latest code..."
            git pull origin main

            echo "🔨 Building app image..."
            docker compose build app

            echo "🚀 Starting containers..."
            docker compose up -d app

            echo "⏳ Waiting for health check..."
            sleep 10
            if curl -sf http://localhost:3000/api/health > /dev/null; then
              echo "✅ Deployed successfully — app is healthy"
            else
              echo "⚠️ App started but health check failed"
              docker logs trip-app --tail 20
              exit 1
            fi
